services:
  app:
    build:
      context: .
      network: host
      args:
        - HTTP_PROXY=${HTTP_PROXY}
        - HTTPS_PROXY=${HTTPS_PROXY}
        - NO_PROXY=${NO_PROXY}
    ports:
      - "7600:7600"
    env_file:
      - .env
    networks:
      - surrealdb_net

networks:
  surrealdb_net:
    external: true
